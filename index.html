<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Mi tarjeta</title>
  </head>
  <body>
    <main id="contenedor">
      <div class="tarjeta-perfil">
        <div class="encabezado-banner"></div>
        <div class="contenedor-avatar">
          <div class="avatar">FB</div>
        </div>
        <div class="card-body text-center">
          <h5 class="card-title">Fabian Beltran</h5>
          <p class="subtitulo">Desarrollador Backend</p>
          <div class="etiquetas mb-3">
            <span class="etiqueta etiqueta-morada">Java</span>
            <span class="etiqueta etiqueta-verde">Python</span>
            <span class="etiqueta etiqueta-azul">JavaScript</span>
          </div>
          <p class="card-text">
            Apasionado por construir experiencias memorables
          </p>
          <button
            class="btn boton-leer"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#contenidoExtra"
            aria-expanded="false"
          >
            Redes
          </button>
          <div class="collapse mt-3" id="contenidoExtra">
            <div class="redes-sociales">
              <a href="#" class="icono-red">
                <img src="./assets/linkedin-plain.svg" alt="LinkedIn" />
              </a>
              <a href="#" class="icono-red">
                <img src="./assets/github-original.svg" alt="GitHub" />
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
